<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f4f4;
    transition: 0.3s;
}

.dark {
    background: #1e1e1e;
    color: white;
}

header {
    background: #333;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
}

.container {
    display: flex;
    padding: 20px;
    gap: 20px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    flex: 1;
}

.dark .card {
    background: #2c2c2c;
}

button {
    padding: 5px 10px;
    cursor: pointer;
}

.completed {
    text-decoration: line-through;
    color: gray;
}

.progress-bar {
    height: 20px;
    background: lightgray;
    border-radius: 10px;
}

.progress {
    height: 100%;
    background: green;
    width: 0%;
    border-radius: 10px;
}
</style>

</head>
<body>

<header>
    <h2>Student Dashboard</h2>
    <button onclick="toggleMode()">🌙 Mode</button>
</header>

<div class="container">

    <!-- To-Do List -->
    <div class="card">
        <h3>To-Do List</h3>
        <input type="text" id="taskInput" placeholder="Enter task">
        <button onclick="addTask()">Add</button>
        <ul id="taskList"></ul>
    </div>

    <!-- Right Section -->
    <div class="card">
        <h3>Clock</h3>
        <h2 id="clock"></h2>

        <h3>Study Planner</h3>
        <input type="text" id="subject" placeholder="Subject">
        <input type="number" id="hours" placeholder="Hours">
        <button onclick="addStudy()">Add</button>
        <ul id="studyList"></ul>

        <h3>Progress</h3>
        <p id="progressText"></p>
        <div class="progress-bar">
            <div class="progress" id="progressBar"></div>
        </div>
    </div>

</div>

</body>
</html>
